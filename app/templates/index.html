<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crop Yield Predictor</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f0f1a;
        color: #eaeaea;
    }

    .wrapper {
        display: flex;
        height: 100vh;
    }

    /* LEFT */
    .left {
        width: 40%;
        background: #1c1c2e;
        padding: 60px 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .left h1 {
        font-size: 32px;
        margin-bottom: 10px;
    }

    .desc {
        margin-top: 18px;
        font-size: 15px;
        line-height: 1.7;
        color: #cfcfe8;
        max-width: 420px;
        border-left: 4px solid #9d4edd;
        padding-left: 16px;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 4px;
    }

    /* RIGHT */
    .right {
        width: 60%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .form-box {
        width: 340px;
    }

    h3 {
        margin-bottom: 12px;
    }

    label {
        font-size: 13px;
        color: #bbb;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 6px 0 14px;
        border: 1px solid #333;
        background: #1a1a2e;
        color: white;
        border-radius: 5px;
        transition: 0.3s;
    }

    /* 🔥 Input interaction */
    input:focus {
        border-color: #9d4edd;
        box-shadow: 0 0 6px #9d4edd55;
        outline: none;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        background: #7b2cbf;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 5px;
        transition: 0.3s;
        position: relative;
    }

    /* 🔥 Hover effect */
    button:hover {
        background: #6930c3;
        transform: translateY(-2px);
    }

    /* 🔥 Click effect */
    button:active {
        transform: scale(0.97);
    }

    hr {
        margin: 25px 0;
        border: 0.5px solid #333;
    }

    /* 🔥 Result Card */
    .result {
        margin-top: 18px;
        font-size: 15px;
        color: #eaeaea;
        background: #1f1f35;
        padding: 12px;
        border-radius: 6px;
        border-left: 4px solid #9d4edd;
        animation: fadeIn 0.5s ease;
    }

    /* 🔥 Loading spinner */
    .loading {
        display: none;
        margin-top: 10px;
        text-align: center;
        color: #9d4edd;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }

</style>
</head>

<body>

<div class="wrapper">

    <!-- LEFT -->
    <div class="left">
        <h1>🌾 Crop Yield Predictor</h1>

        <p class="desc">
            Predict crop yield using weather conditions like rainfall, temperature, and humidity.
            Upload your dataset to update the model or enter values below to get instant predictions.
        </p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="form-box">

            <!-- Update -->
            <h3>Update Model</h3>
            <form action="/upload" method="post" enctype="multipart/form-data" onsubmit="showLoading()">

                <label>Crop Data (CSV)</label>
                <input type="file" name="crop_file" required>

                <label>Weather Data (CSV)</label>
                <input type="file" name="weather_file" required>

                <button type="submit">Update Model</button>

            </form>

            <hr>

            <!-- Predict -->
            <h3>Predict Yield</h3>
            <form action="/predict" method="post" onsubmit="showLoading()">

                <label>Rainfall (mm)</label>
                <input type="number" name="rainfall" required>

                <label>Temperature (°C)</label>
                <input type="number" name="temp" required>

                <label>Humidity (%)</label>
                <input type="number" name="humidity" required>

                <button type="submit">Predict</button>

            </form>

            <!-- 🔥 Loading -->
            <div class="loading" id="loadingText">
                ⏳ Processing...
            </div>

            {% if result %}
            <div class="result">
                {{ result }}
            </div>
            {% endif %}

        </div>
    </div>

</div>

<script>
function showLoading() {
    document.getElementById("loadingText").style.display = "block";
}
</script>

</body>
</html>
